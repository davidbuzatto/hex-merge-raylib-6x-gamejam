    <style>

        /* ============================================================
           Page: a black, unscrollable stage that centers the canvas
           ============================================================ */
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000000;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ============================================================
           Canvas

           Never scale the canvas with CSS. raylib maps mouse input using
           the canvas size, so a CSS scale would offset every click, and
           the hexagons on the last boards are only a few pixels wide.
           ============================================================ */
        canvas.emscripten {
            display: block;
            border: 0 none;
            outline: none;
            background-color: #000000;
            touch-action: none;
            user-select: none;
        }

        /* ============================================================
           Loading overlay

           Covers the canvas until the wasm module and the resource
           bundle finish downloading, which takes a moment: the game
           ships a font, several full screen images and audio tracks.
           ============================================================ */
        #loading {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            background-color: #000000;
            color: #f5f5f5;
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        }

        #loading.hidden {
            display: none;
        }

        #loading-title {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 6px;
        }

        #loading-track {
            width: 260px;
            height: 6px;
            overflow: hidden;
            border-radius: 3px;
            background-color: #202020;
        }

        /* Filled with the game's own palette: red, orange, yellow,
           green, blue and purple. */
        #loading-fill {
            width: 0%;
            height: 100%;
            border-radius: 3px;
            background: linear-gradient( 90deg, #df202e, #ef8c24, #e9d90e, #22a744, #006fd7, #9b14c6 );
            transition: width 0.15s linear;
        }

        #loading-message {
            font-size: 13px;
            color: #808080;
        }

    </style>

</head>
<body>

    <div id="loading">
        <div id="loading-title">HEXAMIX</div>
        <div id="loading-track"><div id="loading-fill"></div></div>
        <div id="loading-message">Loading...</div>
    </div>

    <!-- The context menu is suppressed because the in game editor binds the
         right mouse button. -->
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

    <noscript>
        <p style="color:#f5f5f5;font-family:sans-serif">This game needs JavaScript to run.</p>
    </noscript>

    <script>

        var loadingOverlay = document.getElementById( "loading" );
        var loadingFill = document.getElementById( "loading-fill" );
        var loadingMessage = document.getElementById( "loading-message" );

        var gameCanvas = document.getElementById( "canvas" );

        function hideLoadingOverlay() {
            loadingOverlay.classList.add( "hidden" );
        }

        /**
         * Emscripten reports progress as "Downloading data... (12345/67890)".
         * Split that into a label and a ratio so the bar can be filled; any
         * other message is shown as plain text.
         */
        function showLoadingProgress( text ) {

            var progress = text.match( /([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/ );

            if ( progress ) {
                loadingMessage.textContent = progress[1].trim();
                loadingFill.style.width = ( parseFloat( progress[2] ) / parseFloat( progress[4] ) * 100 ) + "%";
            } else {
                loadingMessage.textContent = text;
            }

        }

        /**
         * Configuration read by the emscripten runtime injected below.
         */
        var Module = {

            canvas: gameCanvas,

            print: function( text ) {
                if ( arguments.length > 1 ) text = Array.prototype.slice.call( arguments ).join( " " );
                console.log( text );
            },

            printErr: function( text ) {
                if ( arguments.length > 1 ) text = Array.prototype.slice.call( arguments ).join( " " );
                console.error( text );
            },

            // An empty status means the runtime is ready.
            setStatus: function( text ) {
                if ( text ) {
                    showLoadingProgress( text );
                } else {
                    hideLoadingOverlay();
                }
            },

            // Called once every pending download has been resolved.
            totalDependencies: 0,
            monitorRunDependencies: function( remaining ) {

                this.totalDependencies = Math.max( this.totalDependencies, remaining );

                if ( remaining === 0 ) {
                    Module.setStatus( "" );
                } else {
                    Module.setStatus( "Preparing... (" + ( this.totalDependencies - remaining ) + "/" + this.totalDependencies + ")" );
                }

            },

            onRuntimeInitialized: function() {
                // Safety net: the overlay must never outlive the loading, even
                // if a status message fails to arrive.
                hideLoadingOverlay();
                // Give the canvas focus so the keyboard shortcuts work without
                // requiring a click first.
                gameCanvas.focus();
            }

        };

        Module.setStatus( "Loading..." );

        window.onerror = function() {
            Module.setStatus( "Something went wrong." );
        };

    </script>
